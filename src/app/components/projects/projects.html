<section id="projects" class="projects">
  <div class="container">
    <div class="section-header">
      <span class="section-badge">Our Work</span>
      <h2>Featured <span class="gradient-text">Projects</span></h2>
      <p>Take a look at some of our successful implementations</p>
    </div>
    <div class="projects-grid">
      <div class="project-card" *ngFor="let project of projects">
        <div class="project-image">
          <div class="project-placeholder">
            <i class="fas" [ngClass]="project.icon"></i>
          </div>
          <div class="project-overlay">
            <a href="#" class="project-btn"><i class="fas fa-eye"></i></a>
          </div>
        </div>
        <div class="project-content">
          <span class="project-category">{{ project.category }}</span>
          <h4>{{ project.title }}</h4>
          <p>{{ project.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
